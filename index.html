<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrismarTech</title>

  <style>
    :root {
      --bg: #0a0f0d;
      --bg2: #0f1a14;
      --verde: #2ecc71;

      --blanco: #ecf0f1;
      --borde: rgba(46,204,113,0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--blanco);
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 10px;
      color: var(--verde);
    }

    p {
      max-width: 680px;
      font-size: 1rem;
      color: var(--gris);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .cards {

      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 900px;
      width: 100%;
    }

      border: 1px solid var(--borde);
      padding: 24px;
