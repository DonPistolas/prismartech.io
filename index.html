<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrismarTech</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0a0f0d;
      color: #ecf0f1;
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #2ecc71;
    }

    p {
      max-width: 600px;
      font-size: 1rem;
      color: #95a5a6;
      margin-bottom: 40px;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #0f1a14;
      border: 1px solid rgba(46,204,113,0.25);
      padding: 24px;
      width: 260px;
      text-align: left;
      cursor: pointer;
      transition: transform 0.2s, border 0.2s;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #2ecc71;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.2rem;
      color: #2ecc71;
    }

    .card span {
      font-size: 0.85rem;
      color: #95a5a6;
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.75rem;
      color: #7f8c8d;
    }
  </style>
</head>
<body>

  <h1>PrismarTech</h1>
  <p>
    Laboratorio de tecnología aplicada: datos, sensores, satélites y sistemas
    inteligentes para problemas reales.
  </p>

  <div class="cards">
    <div class="card" onclick="location.href='agrotech/'      AgroSense MVP · Satélite + IoT + IA · Agricultura prescriptiva
      </span>
    </div>

    <div class="card">
      <h2>📊 Data & IA</h2>
      <span>
        Proyectos futuros de analítica, modelos y visualización
      </span>
    </div>

    <div class="card">
      <h2>🛰️ Geoespacial</h2>
      <span>
        Imágenes satelitales, mapas y monitoreo territorial
      </span>
    </div>
  </div>

  <footer>
    © 2026 · PrismarTech · Jalisco, MX
  </footer>

</body>
</html>
